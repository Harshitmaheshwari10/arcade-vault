<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snake — Arcade Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--bg:#0a0b0f;--surface:#12141a;--card:#1a1d26;--border:#2a2d3a;--accent:#7c3aed;--accent2:#06b6d4;--green:#10b981;--text:#e2e8f0;--muted:#64748b;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
  nav{width:100%;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);}
  .logo{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--accent2);}
  .logo span{color:var(--accent);}
  nav a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;}
  nav a:hover{color:var(--text);}
  .game-area{padding:2rem;display:flex;flex-direction:column;align-items:center;gap:1.25rem;}
  h1{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--green);}
  .hud{display:flex;gap:2.5rem;font-family:'Press Start 2P',monospace;font-size:10px;}
  .hud-item span{color:var(--muted);display:block;margin-bottom:.3rem;}
  .hud-item strong{color:var(--accent2);font-size:14px;}
  canvas{border:2px solid var(--border);border-radius:8px;display:block;}
  .controls{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;}
  .ctrl-hint{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.4rem .9rem;font-size:12px;color:var(--muted);}
  .ctrl-hint kbd{color:var(--text);font-weight:600;}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,11,15,0.88);border-radius:8px;gap:1rem;font-family:'Press Start 2P',monospace;}
  .overlay h2{font-size:20px;color:var(--green);}
  .overlay.gameover h2{color:#ef4444;}
  .overlay p{font-size:10px;color:var(--muted);line-height:2;}
  .canvas-wrap{position:relative;}
  .restart-btn{background:var(--accent);color:#fff;border:none;padding:.6rem 1.4rem;border-radius:6px;font-family:'Press Start 2P',monospace;font-size:10px;cursor:pointer;margin-top:.5rem;}
  .restart-btn:hover{opacity:.85;}
</style>
</head>
<body>
<nav>
  <div class="logo">ARCADE<span>VAULT</span></div>
  <a href="index.html">← Back to hub</a>
</nav>
<div class="game-area">
  <h1>🐍 Snake</h1>
  <div class="hud">
    <div class="hud-item"><span>Score</span><strong id="score">0</strong></div>
    <div class="hud-item"><span>Best</span><strong id="best">0</strong></div>
    <div class="hud-item"><span>Level</span><strong id="level">1</strong></div>
  </div>
  <div class="canvas-wrap">
    <canvas id="c" width="480" height="480"></canvas>
    <div class="overlay" id="overlay">
      <h2>SNAKE</h2>
      <p>Use WASD or Arrow keys to move<br/>Eat food to grow<br/>Don't hit walls or yourself</p>
      <button class="restart-btn" onclick="startGame()">START GAME</button>
    </div>
  </div>
  <div class="controls">
    <span class="ctrl-hint"><kbd>W A S D</kbd> or Arrows — move</span>
    <span class="ctrl-hint"><kbd>P</kbd> — pause</span>
    <span class="ctrl-hint"><kbd>R</kbd> — restart</span>
  </div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const CELL=20,COLS=24,ROWS=24;
let snake,dir,nextDir,food,score,best=0,level,running=false,paused=false,loop;

const colors={bg:'#0a0b0f',grid:'#12141a',head:'#10b981',body:'#059669',food:'#ef4444',foodGlow:'#fca5a5'};

function startGame(){
  document.getElementById('overlay').style.display='none';
  snake=[{x:12,y:12},{x:11,y:12},{x:10,y:12}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;level=1;running=true;paused=false;
  spawnFood();update();
  document.getElementById('score').textContent=0;
  document.getElementById('level').textContent=1;
  clearInterval(loop);
  loop=setInterval(tick,150);
}

function spawnFood(){
  do{food={x:Math.floor(Math.random()*(COLS-2))+1,y:Math.floor(Math.random()*(ROWS-2))+1};}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
}

function tick(){
  if(!running||paused)return;
  dir={...nextDir};
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
    endGame();return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10;
    level=Math.floor(score/50)+1;
    document.getElementById('score').textContent=score;
    document.getElementById('level').textContent=level;
    clearInterval(loop);loop=setInterval(tick,Math.max(60,150-level*12));
    spawnFood();
  }else{snake.pop();}
  draw();
}

function draw(){
  ctx.fillStyle=colors.bg;ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let x=0;x<COLS;x++)for(let y=0;y<ROWS;y++){ctx.fillStyle=colors.grid;ctx.fillRect(x*CELL+1,y*CELL+1,CELL-1,CELL-1);}
  // food glow
  ctx.shadowColor=colors.foodGlow;ctx.shadowBlur=12;
  ctx.fillStyle=colors.food;
  roundRect(food.x*CELL+3,food.y*CELL+3,CELL-6,CELL-6,4);
  ctx.shadowBlur=0;
  // snake
  snake.forEach((s,i)=>{
    ctx.fillStyle=i===0?colors.head:colors.body;
    roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,i===0?5:3);
  });
  // eyes
  const h=snake[0],ex=h.x*CELL+CELL/2,ey=h.y*CELL+CELL/2;
  const offs=dir.x!==0?[[0,-4],[0,4]]:[[- 4,0],[4,0]];
  offs.forEach(([ox,oy])=>{ctx.fillStyle='#0a0b0f';ctx.beginPath();ctx.arc(ex+ox,ey+oy,2.5,0,Math.PI*2);ctx.fill();});
}

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fill();}

function endGame(){
  running=false;clearInterval(loop);
  if(score>best){best=score;document.getElementById('best').textContent=best;}
  const ov=document.getElementById('overlay');
  ov.className='overlay gameover';
  ov.innerHTML=`<h2>GAME OVER</h2><p>Score: ${score} &nbsp;|&nbsp; Best: ${best}<br/>Level reached: ${level}</p><button class="restart-btn" onclick="startGame()">TRY AGAIN</button>`;
  ov.style.display='flex';
}

function update(){draw();}

document.addEventListener('keydown',e=>{
  const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
  const k=map[e.key]||map[e.key.toLowerCase()];
  if(k&&!(k.x===-dir.x&&k.y===-dir.y)){nextDir=k;e.preventDefault();}
  if(e.key==='p'||e.key==='P'){paused=!paused;}
  if(e.key==='r'||e.key==='R'){startGame();}
});
draw();
</script>
</body>
</html>
